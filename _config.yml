title: PaintRush
author: PaintRush Team

navbar-links:
  About: "about"
  Products: "products"
  Sustainability: "sustainability"
  Contact: "contact"

avatar: "/assets/img/PaintRushLogo.png"
round-avatar: true

social-network-links:
  email: "PaintRush@outlook.com"
  github: PaintRushSETU
  twitter: PaintRushWd
  instagram: paintrush.wd
  youtube: "@PaintRushWd"

rss-description: PaintRush is an eco-conscious art supply brand offering affordable, accessible materials for students, hobbyists and emerging creatives.

share-links-active:
  twitter: false
  facebook: false
  linkedin: false
  vk: false
  reddit: false

title-on-all-pages: true
excerpt_length: 50
feed_show_excerpt: false
feed_show_tags: false
post_search: false
edit_page_button: false
navbar-var-length: false

keywords: "art supplies Ireland, affordable art supplies, student art supplies, eco-friendly art supplies, fast delivery art materials, online art shop Ireland, Waterford art supplies, hobby artist supplies"

page-col: "#F7F4EE"
text-col: "#2E3440"
link-col: "#1F2A44"
hover-col: "#F1D012"
navbar-col: "#1F2430"
navbar-text-col: "#FFFFFF"
navbar-border-col: "#1F2430"
footer-col: "#1F2430"
footer-text-col: "#FFFFFF"
footer-link-col: "#F1D012"
footer-hover-col: "#FFFFFF"

# Optional: add Google Analytics Measurement ID here for campaign tracking
# gtag: "G-XXXXXXXXXX"

date_format: "%B %-d, %Y"

timezone: "Europe/Dublin"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: true
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap

